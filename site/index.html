<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7efe2" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="给家人报个平安，让牵挂有回应。" />
    <meta property="og:title" content="家里亮着灯｜家人平安小站" />
    <meta property="og:description" content="打开看看家人的最新近况。" />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/app-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <title>家里亮着灯</title>
  </head>
  <body>
    <div class="page-glow page-glow-one" aria-hidden="true"></div>
    <div class="page-glow page-glow-two" aria-hidden="true"></div>

    <div class="app-shell">
      <header class="hero">
        <div class="top-line">
          <div class="brand-pill">
            <span class="brand-dot" aria-hidden="true"></span>
            <span id="site-name">家里亮着灯</span>
          </div>
          <button class="text-button" id="open-editor" type="button">
            更新状态
          </button>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">给牵挂一个回应</p>
          <h1 id="greeting">今天也要让家人<br />放心一点 <span aria-hidden="true">🧡</span></h1>
          <p class="hero-description">不用发长消息，点一下近况，全家就能看到。</p>
        </div>

        <div class="sync-line" role="status">
          <span class="sync-icon" id="sync-icon" aria-hidden="true">↻</span>
          <span id="sync-copy">正在看看大家的近况…</span>
        </div>
      </header>

      <main>
        <section aria-labelledby="family-title">
          <div class="section-heading">
            <div>
              <p class="section-kicker">此刻</p>
              <h2 id="family-title">家人都还好吗</h2>
            </div>
            <span class="section-note">自动刷新</span>
          </div>
          <div class="family-grid" id="family-grid" aria-live="polite"></div>
        </section>

        <button class="quick-safe" id="quick-safe" type="button">
          <span class="quick-safe-icon" aria-hidden="true">💡</span>
          <span>
            <strong>我挺好的，给家里亮灯</strong>
            <small>一键同步“一切都好”</small>
          </span>
          <span class="quick-safe-arrow" aria-hidden="true">→</span>
        </button>

        <section class="reply-section" aria-labelledby="reply-title">
          <div class="section-heading compact">
            <div>
              <p class="section-kicker">爸妈回话</p>
              <h2 id="reply-title">看到啦，回 Ta 一句</h2>
            </div>
            <span class="section-note">会提醒给我</span>
          </div>

          <div class="reply-panel">
            <div class="reply-identity" aria-label="选择回复人">
              <span>我是</span>
              <button class="reply-person selected" type="button" data-reply-person="mom" aria-pressed="true">妈妈</button>
              <button class="reply-person" type="button" data-reply-person="dad" aria-pressed="false">爸爸</button>
            </div>

            <div class="meme-grid">
              <button class="meme-card meme-tv" type="button" data-preset-id="tv">
                <span class="meme-art" aria-hidden="true"><b>😌</b><i>📺</i></span>
                <span class="meme-tag">安心模式 ON</span>
                <strong>收到！担心频道<br />已切换成追剧频道</strong>
                <small>点击直接发送</small>
              </button>

              <button class="meme-card meme-call" type="button" data-preset-id="call">
                <span class="meme-art" aria-hidden="true"><b>🫡</b><i>☎️</i></span>
                <span class="meme-tag">今日特赦</span>
                <strong>准奏！今晚免除<br />夺命连环 Call</strong>
                <small>点击直接发送</small>
              </button>
            </div>

            <form class="custom-reply" id="reply-form">
              <label for="reply-input">或者自己说一句</label>
              <div class="reply-input-row">
                <input id="reply-input" type="text" maxlength="40" enterkeyhint="send" placeholder="例如：早点休息，别只顾着忙" />
                <button id="send-reply" type="submit">发送</button>
              </div>
              <p>最多 40 个字，只发一行。</p>
            </form>
          </div>
        </section>

        <section class="status-section" aria-labelledby="status-title">
          <div class="section-heading compact">
            <div>
              <p class="section-kicker">打个卡</p>
              <h2 id="status-title">换个近况</h2>
            </div>
            <span class="section-note">一次同步给全家</span>
          </div>
          <div class="status-grid" id="status-grid"></div>
        </section>

        <section class="activity-section" aria-labelledby="activity-title">
          <div class="section-heading compact">
            <div>
              <p class="section-kicker">最近</p>
              <h2 id="activity-title">家里的亮灯记录</h2>
            </div>
            <span class="section-note" id="activity-count"></span>
          </div>
          <div class="activity-card" id="activity-list"></div>
        </section>

        <section class="latest-replies" id="latest-replies-section" aria-labelledby="latest-replies-title" hidden>
          <div class="section-heading compact">
            <div>
              <p class="section-kicker">回音</p>
              <h2 id="latest-replies-title">家人的最近回复</h2>
            </div>
          </div>
          <div class="reply-list" id="reply-list"></div>
        </section>
      </main>

      <footer>
        <p><span aria-hidden="true">🔒</span> 不会自动获取或分享位置</p>
        <p>愿每一次小小的回应，都让家人安心。</p>
      </footer>
    </div>

    <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
    <section class="edit-sheet" id="edit-sheet" aria-labelledby="edit-title" aria-modal="true" role="dialog" hidden>
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-heading">
        <div>
          <p class="section-kicker">报个平安</p>
          <h2 id="edit-title">更新我的近况</h2>
        </div>
        <button class="close-button" id="close-editor" type="button" aria-label="关闭">×</button>
      </div>

      <form id="status-form">
        <fieldset>
          <legend>是谁在打卡？</legend>
          <div class="member-picker" id="member-picker"></div>
        </fieldset>

        <fieldset>
          <legend>现在是什么状态？</legend>
          <div class="sheet-status-grid" id="sheet-status-grid"></div>
        </fieldset>

        <label class="code-field">
          <span>家庭口令</span>
          <input id="family-code" name="code" type="password" inputmode="numeric" autocomplete="current-password" placeholder="请输入家庭口令" required />
          <small>只有知道口令的人可以更新，查看不需要口令。</small>
        </label>

        <button class="submit-button" id="submit-status" type="submit">
          点亮给家人看
        </button>
      </form>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
